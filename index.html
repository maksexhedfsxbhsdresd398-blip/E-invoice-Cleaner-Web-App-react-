<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #f4f4f4; text-align: center; }
    </style>
</head>
<body>
    <h2>CSV Invoice Analyzer</h2>
    <input type="file" id="csvFile" accept=".csv">
    <div id="result"></div>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split(/\r?\n/);
                let data = {};

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === "") continue;

                    let row = rows[i].replace(/"/g, '');
                    let cols = row.split(';');

                    if (cols.length < 8) continue;

                    const situation = cols[7].trim();
                    const vat = parseCurrency(cols[5]);
                    const taxable = parseCurrency(cols[6]);

                    if (!data[situation]) {
                        data[situation] = { count: 0, countVAT: 0, countNoVAT: 0, vatSum: 0, taxWithVATSum: 0, taxNoVATSum: 0 };
                    }
                    
                    data[situation].count++;
                    if (vat > 0) {
                        data[situation].countVAT++;
                        data[situation].vatSum += vat;
                        data[situation].taxWithVATSum += taxable;
                    } else {
                        data[situation].countNoVAT++;
                        data[situation].taxNoVATSum += taxable;
                    }
                }
                displayResults(data);
            };
            reader.readAsText(file);
        });

        function parseCurrency(val) {
            if (!val) return 0;
            let cleaned = val.replace(/[^0-9,.]/g, '');
            if (cleaned.includes(',')) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            }
            return parseFloat(cleaned) || 0;
        }

        function displayResults(data) {
            let html = '<table><tr><th>Situation</th><th>VAT (Sum)</th><th>Base With VAT (Sum)</th><th>Base No VAT (Sum)</th></tr>';
            let g = { cV: 0, cN: 0, cT: 0, vS: 0, tWS: 0, tNS: 0 };
            
            // Set counts in headers
            let header = document.querySelector('tr');
            
            for (let s in data) {
                html += `<tr><td>${s}</td>
                         <td>${data[s].vatSum.toFixed(2)}</td>
                         <td>${data[s].taxWithVATSum.toFixed(2)}</td>
                         <td>${data[s].taxNoVATSum.toFixed(2)}</td></tr>`;
                
                g.cV += data[s].countVAT; g.cN += data[s].countNoVAT;
                g.vS += data[s].vatSum; g.tWS += data[s].taxWithVATSum; g.tNS += data[s].taxNoVATSum;
            }
            
            // Update table header with total counts
            html = html.replace('VAT (Sum)', `VAT (Count: ${g.cV} | Sum)`);
            html = html.replace('Base With VAT (Sum)', `Base With VAT (Count: ${g.cV} | Sum)`);
            html = html.replace('Base No VAT (Sum)', `Base No VAT (Count: ${g.cN} | Sum)`);

            html += `<tr><td><strong>Total</strong></td>
                     <td><strong>${g.vS.toFixed(2)}</strong></td>
                     <td><strong>${g.tWS.toFixed(2)}</strong></td>
                     <td><strong>${g.tNS.toFixed(2)}</strong></td></tr></table>`;
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
