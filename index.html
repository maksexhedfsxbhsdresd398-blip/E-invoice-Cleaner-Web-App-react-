<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #f4f4f4; text-align: center; }
    </style>
</head>
<body>
    <h2>CSV Invoice Analyzer</h2>
    <input type="file" id="csvFile" accept=".csv">
    <div id="result"></div>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split(/\r?\n/);
                let data = {};

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === "") continue;

                    // 1. Strip all quotes first
                    let row = rows[i].replace(/"/g, '');
                    // 2. Now split by semicolon
                    let cols = row.split(';');

                    if (cols.length < 8) continue;

                    const situation = cols[7].trim();
                    const total = parseCurrency(cols[4]);
                    const vat = parseCurrency(cols[5]);
                    const taxable = parseCurrency(cols[6]);

                    if (!data[situation]) data[situation] = { count: 0, total: 0, vat: 0, taxable: 0 };
                    data[situation].count++;
                    data[situation].total += total;
                    data[situation].vat += vat;
                    data[situation].taxable += taxable;
                }
                displayResults(data);
            };
            reader.readAsText(file);
        });

        function parseCurrency(val) {
            if (!val) return 0;
            // Keep only digits, comma, dot.
            let cleaned = val.replace(/[^0-9,.]/g, '');
            // Convert European format (1.234,56) to standard float (1234.56)
            if (cleaned.includes(',')) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            }
            return parseFloat(cleaned) || 0;
        }

        function displayResults(data) {
            let html = '<table><tr><th>Situation</th><th>Count</th><th>Total (€)</th><th>VAT (€)</th><th>Taxable Base (€)</th></tr>';
            let g = { count: 0, total: 0, vat: 0, taxable: 0 };
            for (let s in data) {
                html += `<tr><td>${s}</td><td>${data[s].count}</td><td>${data[s].total.toFixed(2)}</td><td>${data[s].vat.toFixed(2)}</td><td>${data[s].taxable.toFixed(2)}</td></tr>`;
                g.count += data[s].count; g.total += data[s].total; g.vat += data[s].vat; g.taxable += data[s].taxable;
            }
            html += `<tr><td><strong>Total</strong></td><td><strong>${g.count}</strong></td><td><strong>${g.total.toFixed(2)}</strong></td><td><strong>${g.vat.toFixed(2)}</strong></td><td><strong>${g.taxable.toFixed(2)}</strong></td></tr></table>`;
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
