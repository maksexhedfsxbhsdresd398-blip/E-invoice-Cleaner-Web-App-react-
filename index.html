<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>E-Invoice Cleaner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { --bg:#f6f7fb; --fg:#111; --muted:#6b7280; --card:#fff; --border:#e5e7eb; }
    body { margin:0; font:14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--fg); }
    .container { max-width:1000px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
    header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    h1 { font-size:20px; margin:0; }
    .row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    .btn { border:1px solid var(--border); background:#111; color:#fff; padding:8px 12px; border-radius:14px; cursor:pointer; }
    .btn.secondary { background:#fff; color:#111; }
    .pill { padding:6px 10px; border:1px solid var(--border); border-radius:10px; background:#fff; }
    input[type="text"] { border:1px solid var(--border); border-radius:10px; padding:6px 8px; width:60px; }
    .muted { color:var(--muted); font-size:12px; }
    .pane { padding:16px; }
    .output { white-space:pre-wrap; background:#fff; padding:12px; border-radius:12px; box-shadow:0 1px 2px rgba(0,0,0,.04); border:1px solid var(--border); }
    .empty { border:2px dashed var(--border); padding:24px; text-align:center; color:var(--muted); border-radius:16px; }
    .spacer { height:12px; }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.13.12/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useCallback, useRef, useState } = React;

    // --- Helpers ---
    const clamp2 = (n) => Math.round((n + Number.EPSILON) * 100) / 100;

    function normalizeAmount(raw) {
      if (raw == null) return null;
      let s = String(raw).trim();
      if (!s) return null;
      s = s.replace(/€/g, "").replace(/\s+/g, "");
      if (!s) return null;

      // Fix mixed formats like 1.562.99 -> 1562.99 (if no commas, keep only last dot)
      const dotCount = (s.match(/\./g) || []).length;
      if (dotCount > 1 && !s.includes(",")) {
        const lastDot = s.lastIndexOf(".");
        let out = "";
        for (let i = 0; i < s.length; i++) {
          const ch = s[i];
          out += (ch === "." && i !== lastDot) ? "" : ch;
        }
        s = out;
      }

      // Remove all thousands '.' and replace decimal ',' with '.'
      s = s.replace(/\./g, "").replace(/,/g, ".");
      const val = Number.parseFloat(s);
      return Number.isNaN(val) ? null : val;
    }

    function sum2(values) {
      const s = values.reduce((acc, v) => acc + (typeof v === "number" ? v : 0), 0);
      return clamp2(s);
    }

    function toCSVString(values) {
      return values.join(", ");
    }

    // OCR amount extraction
    function extractAmountsFromText(text) {
      const regex = /(?:€\s*)?[0-9]{1,3}(?:\.[0-9]{3})*(?:,[0-9]{1,2})?|(?:€\s*)?[0-9]+(?:,[0-9]{1,2})?/g;
      const matches = text.match(regex) || [];
      return matches.map(normalizeAmount).filter(v => v != null);
    }

    // CSV parsing (semicolon by default)
    function parseCSV(file, delimiter = ";") {
      return new Promise((resolve, reject) => {
        Papa.parse(file, {
          header: true,
          delimiter,
          skipEmptyLines: true,
          complete: (res) => resolve(res.data),
          error: (err) => reject(err),
          encoding: "UTF-8",
        });
      });
    }

    async function parseXLSX(file) {
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: "array" });
      const wsName = wb.SheetNames[0];
      const ws = wb.Sheets[wsName];
      return XLSX.utils.sheet_to_json(ws, { defval: "" });
    }

    function processRows(rows) {
      const hasVAT = rows.some(r => Object.prototype.hasOwnProperty.call(r, "VAT"));
      const hasBase = rows.some(r => Object.prototype.hasOwnProperty.call(r, "Taxable Base"));
      const hasTotal = rows.some(r => Object.prototype.hasOwnProperty.call(r, "Total"));

      const colVAT = hasVAT ? rows.map(r => normalizeAmount(r["VAT"])).filter(v => v != null) : [];
      const colBase = hasBase ? rows.map(r => normalizeAmount(r["Taxable Base"])).filter(v => v != null) : [];
      const colTotal = hasTotal ? rows.map(r => normalizeAmount(r["Total"])).filter(v => v != null) : [];

      const warnings = [];
      if (hasVAT && hasBase && hasTotal) {
        for (let i = 0; i < rows.length; i++) {
          const v = normalizeAmount(rows[i]["VAT"]);
          const b = normalizeAmount(rows[i]["Taxable Base"]);
          const t = normalizeAmount(rows[i]["Total"]);
          if (v != null && b != null && t != null) {
            if (Math.abs(v + b - t) > 0.02) {
              warnings.push(`WARNING: total mismatch on row ${i + 1}`);
            }
          }
        }
      }

      return {
        VAT: { present: hasVAT, values: colVAT, count: colVAT.length, sum: sum2(colVAT) },
        TaxableBase: { present: hasBase, values: colBase, count: colBase.length, sum: sum2(colBase) },
        Total: { present: hasTotal, values: colTotal, count: colTotal.length, sum: sum2(colTotal) },
        warnings,
      };
    }

    function formatOutput(name, s) {
      const lines = [];
      lines.push(`File: ${name}`);
      lines.push("");

      // VAT
      if (!s.VAT.present) {
        lines.push("VAT");
        lines.push("Column not found.");
      } else {
        lines.push("VAT");
        lines.push(`Values (${s.VAT.count} total): ${toCSVString(s.VAT.values)}`);
        lines.push(`Count: ${s.VAT.count}`);
        lines.push(`Sum: ${s.VAT.sum.toFixed(2)} €`);
      }
      lines.push("");

      // Taxable Base
      if (!s.TaxableBase.present) {
        lines.push("Taxable Base");
        lines.push("Column not found.");
      } else {
        lines.push("Taxable Base");
        lines.push(`Values (${s.TaxableBase.count} total): ${toCSVString(s.TaxableBase.values)}`);
        lines.push(`Count: ${s.TaxableBase.count}`);
        lines.push(`Sum: ${s.TaxableBase.sum.toFixed(2)} €`);
      }
      lines.push("");

      // Total
      if (!s.Total.present) {
        lines.push("Total");
        lines.push("Column not found.");
      } else {
        lines.push("Total");
        lines.push(`Values (${s.Total.count} total): ${toCSVString(s.Total.values)}`);
        lines.push(`Count: ${s.Total.count}`);
        lines.push(`Sum: ${s.Total.sum.toFixed(2)} €`);
      }

      if (s.warnings.length) {
        lines.push("");
        for (const w of s.warnings) lines.push(w);
      }
      return lines.join("\n");
    }

    function App() {
      const [outputs, setOutputs] = useState([]);
      const [busy, setBusy] = useState(false);
      const [delimiter, setDelimiter] = useState(";");
      const [runOCR, setRunOCR] = useState(true);
      const fileInputRef = useRef(null);

      const onPickFiles = () => fileInputRef.current?.click();

      const handleFiles = useCallback(async (fileList) => {
        const files = Array.from(fileList || []);
        if (!files.length) return;
        setBusy(true);
        const newOutputs = [];

        for (const file of files) {
          const name = file.name;
          const lower = name.toLowerCase();
          try {
            if (lower.endsWith(".csv")) {
              const rows = await parseCSV(file, delimiter || ";");
              const summary = processRows(rows);
              newOutputs.push(formatOutput(name, summary));
            } else if (lower.endsWith(".xlsx") || lower.endsWith(".xls")) {
              const rows = await parseXLSX(file);
              const summary = processRows(rows);
              newOutputs.push(formatOutput(name, summary));
            } else if (/(png|jpe?g|bmp|webp)$/i.test(lower) && runOCR) {
              const buf = await file.arrayBuffer();
              const { data } = await Tesseract.recognize(buf, "eng");
              const values = extractAmountsFromText(data.text);
              const out = [
                `Image: ${name}`,
                `Values (${values.length} total): ${values.join(", ")}`,
                `Count: ${values.length}`,
                `Sum: ${sum2(values).toFixed(2)} €`,
              ].join("\n");
              newOutputs.push(out);
            } else {
              newOutputs.push(`File: ${name}\nUnsupported type (enable OCR for images?)`);
            }
          } catch (e) {
            console.error(e);
            newOutputs.push(`File: ${name}\nERROR: ${e?.message || e}`);
          }
        }

        setOutputs(prev => [...prev, ...newOutputs]);
        setBusy(false);
      }, [delimiter, runOCR]);

      const onDrop = (e) => {
        e.preventDefault();
        handleFiles(e.dataTransfer.files);
      };
      const onDragOver = (e) => e.preventDefault();

      const clearAll = () => setOutputs([]);

      const downloadBlock = (idx) => {
        const blob = new Blob([outputs[idx]], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `e-invoice-output-${idx + 1}.txt`;
        a.click();
        URL.revokeObjectURL(url);
      };

      return (
        <div className="container">
          <header>
            <h1>E-Invoice Cleaner</h1>
            <div className="row">
              <button className="btn secondary" onClick={clearAll}>Clear</button>
            </div>
          </header>

          <div className="card">
            <div className="pane">
              <div className="row" style={{marginBottom: 8}}>
                <div className="row">
                  <label className="pill">
                    CSV delimiter:
                    <input
                      type="text"
                      value={delimiter}
                      onChange={(e) => setDelimiter(e.target.value || ";")}
                      title="CSV delimiter"
                      style={{ marginLeft: 8 }}
                    />
                  </label>
                  <label className="pill">
                    <input
                      type="checkbox"
                      checked={runOCR}
                      onChange={(e) => setRunOCR(e.target.checked)}
                    />
                    <span style={{ marginLeft: 6 }}>Run OCR for images</span>
                  </label>
                </div>
              </div>

              <div className="row">
                <button className="btn" onClick={() => fileInputRef.current?.click()}>Upload files</button>
                <input
                  ref={fileInputRef}
                  type="file"
                  multiple
                  accept=".csv,.xlsx,.xls,.png,.jpg,.jpeg,.bmp,.webp"
                  style={{ display: "none" }}
                  onChange={(e) => handleFiles(e.target.files)}
                />
                {busy ? <span className="muted">Processing…</span> : null}
              </div>

              <div
                className="empty"
                onDrop={onDrop}
                onDragOver={onDragOver}
                style={{marginTop: 12}}
                title="Drag & drop files here"
              >
                Drag & drop files here — or click “Upload files”
                <div className="muted" style={{marginTop: 6}}>
                  Supports .csv (default delimiter ;), .xlsx, and screenshots (OCR).
                </div>
                <div className="muted">
                  Cleaning: remove € & spaces; “.” thousands; “,” decimals; coerce invalid/blank to NA and drop; keep floats; round only the Sum to 2 decimals.
                </div>
              </div>
            </div>
          </div>

          <div className="spacer"></div>

          {outputs.length === 0 ? (
            <div className="empty">
              Upload one or more files named like <code>e-invoice (...).csv</code> or <code>.xlsx</code>. You’ll get the exact structured printout.
            </div>
          ) : (
            outputs.map((block, idx) => (
              <div key={idx} style={{marginBottom: 12}}>
                <div className="row" style={{justifyContent:"flex-end", marginBottom: 6}}>
                  <button className="btn secondary" onClick={() => downloadBlock(idx)}>Download .txt</button>
                </div>
                <div className="output">{block}</div>
              </div>
            ))
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
