<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h2>CSV Invoice Analyzer</h2>
    <input type="file" id="csvFile" accept=".csv">
    <div id="result"></div>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split('\n').slice(1);
                let data = {};

                rows.forEach(row => {
                    const cols = row.split(';');
                    if (cols.length < 8) return;
                    
                    const situation = cols[7].trim();
                    const total = parseFloat(cols[4].replace(' €', '').replace('.', '').replace(',', '.'));
                    const vat = parseFloat(cols[5].replace(' €', '').replace('.', '').replace(',', '.'));
                    const taxable = parseFloat(cols[6].replace(' €', '').replace('.', '').replace(',', '.'));

                    if (!data[situation]) data[situation] = { count: 0, total: 0, vat: 0, taxable: 0 };
                    data[situation].count++;
                    data[situation].total += total;
                    data[situation].vat += vat;
                    data[situation].taxable += taxable;
                });

                let html = '<table><tr><th>Situation</th><th>Count</th><th>Total</th><th>VAT</th><th>Taxable Base</th></tr>';
                for (let s in data) {
                    html += `<tr><td>${s}</td><td>${data[s].count}</td><td>${data[s].total.toFixed(2)}</td><td>${data[s].vat.toFixed(2)}</td><td>${data[s].taxable.toFixed(2)}</td></tr>`;
                }
                html += '</table>';
                document.getElementById('result').innerHTML = html;
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
