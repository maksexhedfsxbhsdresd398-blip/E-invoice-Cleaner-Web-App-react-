<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Invoice Analyzer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: right; }
        th { background-color: #f4f4f4; text-align: center; }
    </style>
</head>
<body>
    <h2>CSV Invoice Analyzer</h2>
    <input type="file" id="csvFile" accept=".csv">
    <div id="result"></div>

    <script>
        document.getElementById('csvFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split(/\r?\n/);
                let data = {};

                for (let i = 1; i < rows.length; i++) {
                    if (rows[i].trim() === "") continue;

                    let row = rows[i].replace(/"/g, '');
                    let cols = row.split(';');

                    if (cols.length < 8) continue;

                    const situation = cols[7].trim();
                    const total = parseCurrency(cols[4]);
                    const vat = parseCurrency(cols[5]);
                    const taxable = parseCurrency(cols[6]);

                    if (!data[situation]) data[situation] = { count: 0, withVAT: 0, withoutVAT: 0 };
                    
                    data[situation].count++;
                    
                    // Logic: If VAT > 0, treat as "With VAT" (use Total), otherwise "No VAT" (use Taxable Base)
                    if (vat > 0) {
                        data[situation].withVAT += total;
                    } else {
                        data[situation].withoutVAT += taxable;
                    }
                }
                displayResults(data);
            };
            reader.readAsText(file);
        });

        function parseCurrency(val) {
            if (!val) return 0;
            let cleaned = val.replace(/[^0-9,.]/g, '');
            if (cleaned.includes(',')) {
                cleaned = cleaned.replace(/\./g, '').replace(',', '.');
            }
            return parseFloat(cleaned) || 0;
        }

        function displayResults(data) {
            let html = '<table><tr><th>Situation</th><th>Count</th><th>Taxable Base (With VAT)</th><th>Taxable Base (No VAT)</th></tr>';
            let g = { count: 0, withVAT: 0, withoutVAT: 0 };
            
            for (let s in data) {
                html += `<tr><td>${s}</td><td>${data[s].count}</td><td>${data[s].withVAT.toFixed(2)}</td><td>${data[s].withoutVAT.toFixed(2)}</td></tr>`;
                g.count += data[s].count; 
                g.withVAT += data[s].withVAT; 
                g.withoutVAT += data[s].withoutVAT;
            }
            html += `<tr><td><strong>Total</strong></td><td><strong>${g.count}</strong></td><td><strong>${g.withVAT.toFixed(2)}</strong></td><td><strong>${g.withoutVAT.toFixed(2)}</strong></td></tr></table>`;
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
